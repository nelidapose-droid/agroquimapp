<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgroQuimApp · Analíticas</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Space+Grotesk:wght@300;400;500;700&display=swap');

:root {
  --verde:#00C896; --lila:#7C3AED; --naranja:#FF6B35;
  --amarillo:#FFD93D; --azul:#3B82F6; --rosa:#EC4899;
  --fondo:#0A0A14; --fondo2:#12121F; --card:#181828;
  --card2:#1E1E35; --texto:#F0F0FF; --texto-sub:#8888AA; --borde:#252545;
  --u1:#00C896; --u2:#7C3AED; --u3:#FF6B35;
  --u4:#EC4899; --u5:#3B82F6; --u6:#FFD93D;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family:'Nunito',sans-serif;
  background:var(--fondo);
  color:var(--texto);
  min-height:100vh;
}

/* ── TOP BAR ── */
.topbar {
  background:rgba(10,10,20,.9);
  backdrop-filter:blur(14px);
  border-bottom:1px solid var(--borde);
  padding:12px 24px;
  display:flex; align-items:center; justify-content:space-between; gap:12px;
  position:sticky; top:0; z-index:100;
}
.topbar-logo {
  font-size:1.1rem; font-weight:900;
  background:linear-gradient(135deg,var(--verde),var(--lila));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.topbar-right { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }

.btn-sm {
  padding:6px 14px; border-radius:10px; font-family:'Nunito',sans-serif;
  font-size:.78rem; font-weight:700; cursor:pointer; transition:all .2s; border:1.5px solid;
}
.btn-outline { border-color:var(--borde); background:transparent; color:var(--texto-sub); }
.btn-outline:hover { border-color:var(--verde); color:var(--verde); }
.btn-danger-sm { border-color:var(--naranja); background:rgba(255,107,53,.1); color:var(--naranja); }
.btn-danger-sm:hover { background:rgba(255,107,53,.2); }
.btn-green { border-color:var(--verde); background:rgba(0,200,150,.1); color:var(--verde); }
.btn-green:hover { background:rgba(0,200,150,.2); }

.last-updated { font-size:.72rem; color:var(--texto-sub); }

/* ── LAYOUT ── */
.dash { max-width:1100px; margin:0 auto; padding:28px 20px; }

/* ── EMPTY STATE ── */
.empty-state {
  text-align:center; padding:80px 20px;
  background:var(--card); border-radius:20px; border:1.5px solid var(--borde);
}
.empty-state .big-icon { font-size:4rem; display:block; margin-bottom:16px; }
.empty-state h2 { font-size:1.5rem; font-weight:900; margin-bottom:8px; }
.empty-state p { color:var(--texto-sub); font-size:.9rem; max-width:420px; margin:0 auto; line-height:1.6; }

/* ── SECTION TITLES ── */
.section-label {
  font-size:.7rem; font-weight:700; text-transform:uppercase; letter-spacing:2px;
  color:var(--texto-sub); margin-bottom:14px; display:flex; align-items:center; gap:8px;
}
.section-label::after { content:''; flex:1; height:1px; background:var(--borde); }

/* ── KPI ROW ── */
.kpi-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; margin-bottom:28px; }

.kpi {
  background:var(--card); border:1.5px solid var(--borde); border-radius:16px;
  padding:18px 16px; position:relative; overflow:hidden;
  transition:border-color .2s;
}
.kpi:hover { border-color:var(--accent,var(--verde)); }
.kpi::before {
  content:''; position:absolute; bottom:0; left:0; right:0; height:3px;
  background:var(--accent,var(--verde));
}
.kpi-label { font-size:.7rem; font-weight:700; color:var(--texto-sub); text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; }
.kpi-value { font-size:2.1rem; font-weight:900; font-family:'Space Grotesk',sans-serif; color:var(--accent,var(--verde)); line-height:1; }
.kpi-sub { font-size:.72rem; color:var(--texto-sub); margin-top:5px; }

/* ── GRID 2 COLS ── */
.grid2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:28px; }
.grid3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; margin-bottom:28px; }
@media(max-width:700px){ .grid2,.grid3{ grid-template-columns:1fr; } }

/* ── CARDS ── */
.card {
  background:var(--card); border:1.5px solid var(--borde); border-radius:18px; padding:22px;
}
.card-title { font-size:.95rem; font-weight:800; margin-bottom:16px; display:flex; align-items:center; gap:8px; }

/* ── BARRAS HORIZONTALES ── */
.bar-row { margin-bottom:10px; }
.bar-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:5px; }
.bar-label { font-size:.82rem; font-weight:700; }
.bar-value { font-size:.8rem; font-weight:700; color:var(--accent,var(--verde)); font-family:'Space Grotesk',sans-serif; }
.bar-track { height:8px; background:var(--borde); border-radius:6px; overflow:hidden; }
.bar-fill { height:100%; border-radius:6px; transition:width .8s ease; }
.bar-meta { font-size:.7rem; color:var(--texto-sub); margin-top:2px; }

/* ── TABLA ── */
.table-wrap { overflow-x:auto; }
table { width:100%; border-collapse:collapse; font-size:.82rem; }
th { color:var(--texto-sub); font-weight:700; font-size:.7rem; text-transform:uppercase; letter-spacing:.8px; padding:8px 12px; border-bottom:1px solid var(--borde); text-align:left; }
td { padding:10px 12px; border-bottom:1px solid rgba(37,37,69,.5); }
tr:last-child td { border-bottom:none; }
tr:hover td { background:rgba(0,200,150,.03); }
.badge-tag { display:inline-block; padding:2px 8px; border-radius:8px; font-size:.7rem; font-weight:700; }
.tag-verde { background:rgba(0,200,150,.12); color:var(--verde); }
.tag-naranja { background:rgba(255,107,53,.12); color:var(--naranja); }
.tag-lila { background:rgba(124,58,237,.12); color:var(--lila); }
.tag-amarillo { background:rgba(255,217,61,.12); color:var(--amarillo); }

/* ── RADAR / PIE FAKE (SVG custom) ── */
.chart-svg { width:100%; overflow:visible; }

/* ── HEAT CALENDAR ── */
.heat-grid { display:flex; gap:4px; flex-wrap:wrap; margin-top:8px; }
.heat-cell {
  width:24px; height:24px; border-radius:5px;
  font-size:.62rem; font-weight:700;
  display:flex; align-items:center; justify-content:center;
  color:rgba(240,240,255,.5);
  transition:transform .15s;
}
.heat-cell:hover { transform:scale(1.2); }

/* ── MINI LINE CHART ── */
.sparkline-wrap { width:100%; height:60px; margin-top:8px; }

/* ── BADGES ── */
.badges-grid { display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; }
.badge-item {
  padding:6px 13px; border-radius:12px; border:1.5px solid;
  font-size:.76rem; font-weight:700;
  transition:transform .15s;
}
.badge-item:hover { transform:scale(1.05); }
.badge-item.earned { border-color:var(--amarillo); color:var(--amarillo); background:rgba(255,217,61,.08); }
.badge-item.locked { border-color:var(--borde); color:var(--texto-sub); opacity:.4; }

/* ── RECOMENDACIONES ── */
.rec-item {
  display:flex; gap:12px; align-items:flex-start;
  padding:12px 14px; border-radius:12px;
  background:rgba(0,200,150,.05); border:1px solid rgba(0,200,150,.15);
  margin-bottom:8px; font-size:.85rem; line-height:1.5;
}
.rec-item.warn { background:rgba(255,107,53,.05); border-color:rgba(255,107,53,.2); }
.rec-item.info { background:rgba(124,58,237,.05); border-color:rgba(124,58,237,.2); }
.rec-icon { font-size:1.3rem; flex-shrink:0; }

/* ── MODAL DEMO ── */
.modal-overlay {
  display:none; position:fixed; inset:0; background:rgba(0,0,0,.7);
  z-index:200; align-items:center; justify-content:center; padding:20px;
}
.modal-overlay.show { display:flex; }
.modal {
  background:var(--card2); border:1.5px solid var(--borde); border-radius:20px;
  padding:28px; max-width:480px; width:100%;
  animation:slideUp .3s ease;
}
@keyframes slideUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
.modal h3 { font-size:1.1rem; font-weight:900; margin-bottom:8px; }
.modal p { font-size:.85rem; color:var(--texto-sub); line-height:1.6; margin-bottom:16px; }
.modal-actions { display:flex; gap:10px; justify-content:flex-end; flex-wrap:wrap; }

/* ── ALERT ── */
.alert {
  padding:13px 16px; border-radius:12px; font-size:.85rem; line-height:1.5;
  display:flex; gap:10px; align-items:flex-start; margin-bottom:20px;
}
.alert.info { background:rgba(59,130,246,.08); border:1px solid rgba(59,130,246,.25); }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div style="display:flex;align-items:center;gap:14px;">
    <div class="topbar-logo">🌱 AgroQuimApp · Analíticas</div>
    <span class="last-updated" id="last-updated-label"></span>
  </div>
  <div class="topbar-right">
    <button class="btn-sm btn-outline" onclick="loadDemo()">🎭 Cargar datos demo</button>
    <button class="btn-sm btn-green" onclick="refreshData()">🔄 Actualizar</button>
    <button class="btn-sm btn-danger-sm" onclick="showResetModal()">🗑 Resetear datos</button>
  </div>
</div>

<!-- MODAL RESET -->
<div class="modal-overlay" id="modal-reset">
  <div class="modal">
    <h3>⚠️ Resetear todos los datos</h3>
    <p>Esto borrará permanentemente todo el historial de progreso, XP, módulos completados y simulacros del alumno/a. Esta acción no se puede deshacer.</p>
    <div class="modal-actions">
      <button class="btn-sm btn-outline" onclick="closeModal()">Cancelar</button>
      <button class="btn-sm btn-danger-sm" onclick="resetData()">Sí, borrar todo</button>
    </div>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dash" id="dashboard"></div>

<script>
// ─────────────────────────────────────────────
// CONSTANTES DE LA APP
// ─────────────────────────────────────────────
const STORAGE_KEY = 'agroquimapp_v2';

const UNIT_META = [
  { id:'u1', label:'U1: Clasificación Materia', color:'#00C896', icon:'🧊', total:8 },
  { id:'u2', label:'U2: Estructura Atómica',    color:'#7C3AED', icon:'⚛️', total:8 },
  { id:'u3', label:'U3: Mol y Cantidad',         color:'#FF6B35', icon:'⚖️', total:8 },
  { id:'u4', label:'U4: Uniones Químicas',       color:'#EC4899', icon:'🔗', total:7 },
  { id:'u5', label:'U5: Reacciones',             color:'#3B82F6', icon:'💥', total:8 },
  { id:'u6', label:'U6: Formulación',            color:'#FFD93D', icon:'📝', total:8 },
];

const ALL_BADGES = [
  { id:'first',     label:'🥇 Primera correcta' },
  { id:'streak5',   label:'🔥 Racha de 5' },
  { id:'xp100',     label:'⭐ 100 XP' },
  { id:'quiz3',     label:'🎯 3 módulos completos' },
  { id:'allunits',  label:'🏆 6 unidades completas' },
  { id:'correct30', label:'💎 30 respuestas bien' },
  { id:'xp300',     label:'🚀 300 XP' },
  { id:'firstexam', label:'📝 Primer simulacro' },
  { id:'pass60',    label:'🎓 Aprobaste 60%+' },
  { id:'pass80',    label:'🌟 80%+ en simulacro' },
];

// ─────────────────────────────────────────────
// CARGA / DEMO
// ─────────────────────────────────────────────
function loadRealData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}

function loadDemo() {
  // Genera datos demo ricos para mostrar todas las analíticas
  const demo = {
    xp: 480, quizzes: 9, correct: 38, streak: 3,
    exams: 3, bestScore: 72,
    completedModules: ['u1','u2','u3','u4','u5'],
    badges: ['first','streak5','xp100','quiz3','correct30','xp300','firstexam','pass60'],
    // Datos enriquecidos (simulados para demo)
    unitStats: {
      u1: { attempted:8, correct:7, incorrect:1 },
      u2: { attempted:8, correct:5, incorrect:3 },
      u3: { attempted:8, correct:6, incorrect:2 },
      u4: { attempted:7, correct:4, incorrect:3 },
      u5: { attempted:8, correct:7, incorrect:1 },
      u6: { attempted:3, correct:3, incorrect:0 },
    },
    examHistory: [
      { date:'2025-07-10', score:48, correct:9,  total:20, timeUsed:3480 },
      { date:'2025-07-14', score:65, correct:13, total:20, timeUsed:3120 },
      { date:'2025-07-18', score:72, correct:14, total:20, timeUsed:2880 },
    ],
    sessionDates: [
      '2025-07-08','2025-07-09','2025-07-10','2025-07-12',
      '2025-07-13','2025-07-14','2025-07-16','2025-07-17','2025-07-18','2025-07-19'
    ]
  };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(demo));
  render();
}

function refreshData() { render(); }

function resetData() {
  localStorage.removeItem(STORAGE_KEY);
  closeModal();
  render();
}

function showResetModal() { document.getElementById('modal-reset').classList.add('show'); }
function closeModal() { document.getElementById('modal-reset').classList.remove('show'); }

// ─────────────────────────────────────────────
// RENDER PRINCIPAL
// ─────────────────────────────────────────────
function render() {
  const state = loadRealData();
  const dash = document.getElementById('dashboard');
  const lastEl = document.getElementById('last-updated-label');
  lastEl.textContent = 'Actualizado: ' + new Date().toLocaleTimeString('es-AR');

  if (!state || (state.xp === 0 && state.quizzes === 0 && state.correct === 0)) {
    dash.innerHTML = renderEmpty();
    return;
  }

  dash.innerHTML = [
    renderInfoAlert(state),
    renderKPIs(state),
    renderUnitPerformance(state),
    renderExamSection(state),
    renderTimeSection(state),
    renderBadgesSection(state),
    renderRecommendations(state),
  ].join('');

  // Post-render: dibujar charts SVG y canvas
  drawRadarChart(state);
  drawExamProgressChart(state);
  drawHeatmap(state);
  drawMiniDonut(state);
}

// ─────────────────────────────────────────────
// EMPTY STATE
// ─────────────────────────────────────────────
function renderEmpty() {
  return `
  <div class="empty-state">
    <span class="big-icon">📊</span>
    <h2>Sin datos todavía</h2>
    <p>Las analíticas aparecerán aquí una vez que el estudiante comience a usar AgroQuimApp y complete módulos o simulacros.</p>
    <p style="margin-top:12px">Para ver una vista previa con datos de ejemplo, hacé clic en <strong>"Cargar datos demo"</strong> arriba.</p>
  </div>`;
}

// ─────────────────────────────────────────────
// ALERT INFO
// ─────────────────────────────────────────────
function renderInfoAlert(state) {
  const pct = unlockPct(state);
  const msg = pct >= 100
    ? '✅ Todos los módulos completados. El simulacro de examen está habilitado.'
    : pct >= 70
    ? `🔓 Simulacro desbloqueado (${pct}% de módulos completados).`
    : `🔒 Simulacro bloqueado — completar al menos el 70% de los módulos. Progreso actual: ${pct}%.`;
  return `<div class="alert info"><span>ℹ️</span><span>${msg}</span></div>`;
}

// ─────────────────────────────────────────────
// KPIs
// ─────────────────────────────────────────────
function unlockPct(state) {
  const done = (state.completedModules || []).filter(id => UNIT_META.find(u => u.id === id)).length;
  return Math.round((done / UNIT_META.length) * 100);
}

function renderKPIs(state) {
  const totalQ = Object.values(state.unitStats || {}).reduce((a,u)=>a+(u.attempted||0),0);
  const pctCorrect = totalQ > 0 ? Math.round((state.correct||0)/totalQ*100) : 0;
  const unitsCompleted = (state.completedModules||[]).length;
  const examAvg = state.examHistory && state.examHistory.length > 0
    ? Math.round(state.examHistory.reduce((a,e)=>a+e.score,0) / state.examHistory.length)
    : null;

  const kpis = [
    { label:'XP Ganados', value:state.xp||0, sub:'puntos de experiencia', accent:'#FFD93D', icon:'⭐' },
    { label:'% Acierto Global', value:(pctCorrect||0)+'%', sub:`${state.correct||0} correctas de ${totalQ}`, accent:'#00C896', icon:'🎯' },
    { label:'Unidades Completas', value:`${unitsCompleted}/6`, sub:`${unlockPct(state)}% del módulo`, accent:'#7C3AED', icon:'📚' },
    { label:'Simulacros', value:state.exams||0, sub:examAvg!==null?`Promedio ${examAvg}%`:'Sin simulacros aún', accent:'#3B82F6', icon:'📝' },
    { label:'Mejor Puntaje', value:state.bestScore!==null?state.bestScore+'%':'—', sub:'en simulacro de ingreso', accent:'#EC4899', icon:'🏆' },
    { label:'Racha Máxima', value:state.streak||0, sub:'respuestas correctas seguidas', accent:'#FF6B35', icon:'🔥' },
  ];

  return `
  <div class="section-label">📊 Indicadores Clave</div>
  <div class="kpi-row">
    ${kpis.map(k=>`
      <div class="kpi" style="--accent:${k.accent}">
        <div class="kpi-label">${k.icon} ${k.label}</div>
        <div class="kpi-value">${k.value}</div>
        <div class="kpi-sub">${k.sub}</div>
      </div>`).join('')}
  </div>`;
}

// ─────────────────────────────────────────────
// RENDIMIENTO POR UNIDAD
// ─────────────────────────────────────────────
function renderUnitPerformance(state) {
  const us = state.unitStats || {};

  const bars = UNIT_META.map(u => {
    const d = us[u.id] || { attempted:0, correct:0, incorrect:0 };
    const pct = d.attempted > 0 ? Math.round(d.correct/d.attempted*100) : null;
    const done = (state.completedModules||[]).includes(u.id);
    return { ...u, ...d, pct, done };
  });

  return `
  <div class="section-label">📚 Rendimiento por Unidad</div>
  <div class="grid2">
    <div class="card">
      <div class="card-title">📊 Porcentaje de acierto por unidad</div>
      ${bars.map(b => `
        <div class="bar-row">
          <div class="bar-header">
            <span class="bar-label">${b.icon} ${b.label}</span>
            <span class="bar-value" style="color:${b.color}">${b.pct !== null ? b.pct+'%' : 'Sin datos'}</span>
          </div>
          <div class="bar-track">
            <div class="bar-fill" style="width:${b.pct||0}%;background:${b.color}"></div>
          </div>
          <div class="bar-meta">
            ${b.pct !== null
              ? `${b.correct} correctas · ${b.incorrect} incorrectas · ${b.attempted}/${b.total} preguntas respondidas${b.done?' · ✅ Completo':''}`
              : b.done ? '✅ Módulo completado' : '⏳ Aún no iniciado'}
          </div>
        </div>`).join('')}
    </div>

    <div class="card">
      <div class="card-title">🕸️ Perfil de competencias</div>
      <svg id="radar-svg" class="chart-svg" viewBox="0 0 280 260"></svg>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:10px">
        ${UNIT_META.map(u=>`
          <span style="font-size:.7rem;display:flex;align-items:center;gap:4px;color:var(--texto-sub)">
            <span style="width:9px;height:9px;border-radius:50%;background:${u.color};display:inline-block"></span>
            ${u.id.toUpperCase()}
          </span>`).join('')}
      </div>
    </div>
  </div>

  <div class="section-label">📋 Detalle por unidad</div>
  <div class="card" style="margin-bottom:28px">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Unidad</th>
            <th>Estado</th>
            <th>Preguntas respondidas</th>
            <th>Correctas</th>
            <th>Incorrectas</th>
            <th>% Acierto</th>
            <th>Diagnóstico</th>
          </tr>
        </thead>
        <tbody>
          ${bars.map(b => {
            const diag = b.pct === null ? ['—',''] :
              b.pct >= 80 ? ['Sólido 💪','tag-verde'] :
              b.pct >= 60 ? ['En proceso 📖','tag-lila'] :
              b.pct >= 40 ? ['Requiere práctica ⚠️','tag-naranja'] :
              ['Reforzar urgente 🔴','tag-naranja'];
            return `<tr>
              <td><strong>${b.icon} ${b.label}</strong></td>
              <td>${b.done?'<span class="badge-tag tag-verde">✅ Completo</span>':'<span class="badge-tag tag-lila">⏳ En curso</span>'}</td>
              <td style="font-family:'Space Grotesk',sans-serif">${b.attempted}/${b.total}</td>
              <td style="color:var(--verde);font-weight:700;font-family:'Space Grotesk',sans-serif">${b.correct||0}</td>
              <td style="color:var(--naranja);font-weight:700;font-family:'Space Grotesk',sans-serif">${b.incorrect||0}</td>
              <td style="font-family:'Space Grotesk',sans-serif;font-weight:700;color:${b.color}">${b.pct !== null ? b.pct+'%':'—'}</td>
              <td><span class="badge-tag ${diag[1]}">${diag[0]}</span></td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  </div>`;
}

// ─────────────────────────────────────────────
// SECCIÓN SIMULACROS
// ─────────────────────────────────────────────
function renderExamSection(state) {
  const history = state.examHistory || [];
  if (!history.length) {
    return `
    <div class="section-label">🎓 Simulacros de Examen</div>
    <div class="card" style="margin-bottom:28px;text-align:center;padding:36px">
      <div style="font-size:2.5rem;margin-bottom:10px">📝</div>
      <div style="font-weight:800;margin-bottom:6px">Sin simulacros realizados</div>
      <div style="color:var(--texto-sub);font-size:.85rem">Cuando el estudiante complete el 70% de los módulos y realice un simulacro, los resultados aparecerán aquí.</div>
    </div>`;
  }

  const avg = Math.round(history.reduce((a,e)=>a+e.score,0)/history.length);
  const trend = history.length > 1 ? history[history.length-1].score - history[0].score : null;
  const fmtTime = secs => {
    const m = Math.floor(secs/60), s = secs%60;
    return `${m}m ${s}s`;
  };

  return `
  <div class="section-label">🎓 Simulacros de Examen</div>
  <div class="grid3" style="margin-bottom:16px">
    <div class="kpi" style="--accent:#3B82F6">
      <div class="kpi-label">📊 Promedio simulacros</div>
      <div class="kpi-value">${avg}%</div>
      <div class="kpi-sub">${history.length} simulacro(s) realizados</div>
    </div>
    <div class="kpi" style="--accent:${state.bestScore>=60?'#00C896':'#FF6B35'}">
      <div class="kpi-label">🏆 Mejor puntaje</div>
      <div class="kpi-value">${state.bestScore||'—'}%</div>
      <div class="kpi-sub">${state.bestScore>=60?'✅ Aprueba el umbral (60%)':'❌ Por debajo del umbral'}</div>
    </div>
    <div class="kpi" style="--accent:#EC4899">
      <div class="kpi-label">📈 Evolución</div>
      <div class="kpi-value">${trend !== null ? (trend >= 0 ? '+' : '') + trend + '%' : '—'}</div>
      <div class="kpi-sub">${trend !== null ? (trend > 0 ? '↑ Mejora entre 1° y último' : trend < 0 ? '↓ Bajó entre 1° y último' : '→ Sin cambio') : 'Se necesitan 2+ simulacros'}</div>
    </div>
  </div>

  <div class="grid2">
    <div class="card">
      <div class="card-title">📈 Evolución del puntaje</div>
      <svg id="exam-progress-svg" class="chart-svg" viewBox="0 0 320 140"></svg>
    </div>
    <div class="card">
      <div class="card-title">📋 Historial de simulacros</div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>#</th><th>Fecha</th><th>Puntaje</th><th>Correctas</th><th>Tiempo usado</th><th>Estado</th></tr></thead>
          <tbody>
            ${history.map((e,i)=>`
              <tr>
                <td style="color:var(--texto-sub)">${i+1}</td>
                <td>${e.date||'—'}</td>
                <td style="font-weight:900;font-family:'Space Grotesk',sans-serif;color:${e.score>=60?'var(--verde)':'var(--naranja)'}">${e.score}%</td>
                <td>${e.correct}/${e.total}</td>
                <td style="color:var(--texto-sub)">${e.timeUsed?fmtTime(3600-e.timeUsed):'—'}</td>
                <td><span class="badge-tag ${e.score>=60?'tag-verde':'tag-naranja'}">${e.score>=60?'✅ Aprobado':'❌ Desaprobado'}</span></td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>
  </div>`;
}

// ─────────────────────────────────────────────

  <div class="grid2" style="margin-bottom:28px">
    <div class="card">
      <div class="card-title">📅 Mapa de actividad (sesiones)</div>
      <div id="heatmap-container"></div>
    </div>
    <div class="card">
      <div class="card-title">🍩 Distribución de respuestas</div>
      <div style="display:flex;align-items:center;gap:20px;margin-top:8px">
        <svg id="donut-svg" width="140" height="140" viewBox="0 0 140 140"></svg>
        <div id="donut-legend"></div>
      </div>

// ─────────────────────────────────────────────
// BADGES
// ─────────────────────────────────────────────
function renderBadgesSection(state) {
  const earned = state.badges || [];
  const earnedCount = earned.length;
  return `
  <div class="section-label">🏅 Logros (${earnedCount}/${ALL_BADGES.length} desbloqueados)</div>
  <div class="card" style="margin-bottom:28px">
    <div class="badges-grid">
      ${ALL_BADGES.map(b=>`
        <div class="badge-item ${earned.includes(b.id)?'earned':'locked'}" 
          title="${earned.includes(b.id)?'✅ Desbloqueado':'🔒 Bloqueado'}">
          ${b.label}

    <div style="margin-top:14px;height:6px;background:var(--borde);border-radius:6px;overflow:hidden">
      <div style="height:100%;width:${Math.round(earnedCount/ALL_BADGES.length*100)}%;background:linear-gradient(90deg,var(--amarillo),var(--naranja));border-radius:6px;transition:width .8s"></div>
    </div>
    <div style="font-size:.75rem;color:var(--texto-sub);margin-top:6px">${earnedCount} de ${ALL_BADGES.length} logros desbloqueados · ${Math.round(earnedCount/ALL_BADGES.length*100)}%</div>
  </div>`;
}

// ─────────────────────────────────────────────
// RECOMENDACIONES PEDAGÓGICAS
// ─────────────────────────────────────────────
function renderRecommendations(state) {
  const us = state.unitStats || {};
  const recs = [];

  // Analizar unidades débiles
  UNIT_META.forEach(u => {
    const d = us[u.id] || {};
    const pct = d.attempted > 0 ? d.correct/d.attempted*100 : null;
    if (pct !== null && pct < 60) {
      recs.push({ type:'warn', icon:'⚠️',
        text:`<strong>${u.label}:</strong> Puntaje de ${Math.round(pct)}% — por debajo del 60%. Se recomienda revisar la teoría y repetir el módulo antes del examen.`
      });
    }
  });

  // Sin completar
  const unfinished = UNIT_META.filter(u => !(state.completedModules||[]).includes(u.id));
  if (unfinished.length > 0) {
    recs.push({ type:'info', icon:'📖',
      text:`Unidades sin completar: <strong>${unfinished.map(u=>u.label.split(':')[0]).join(', ')}</strong>. Completarlas desbloqueará o mejorará el acceso al simulacro.`
    });
  }

  // Sin simulacros
  if (!state.exams || state.exams === 0) {
    recs.push({ type:'info', icon:'🎓',
      text:'Aún no se realizó ningún simulacro de examen. Se recomienda completar al menos el 70% de los módulos y hacer un simulacro para evaluar el nivel de preparación real.'
    });
  }

  // Simulacros por debajo del 60%
  if (state.bestScore !== null && state.bestScore < 60) {
    recs.push({ type:'warn', icon:'🔴',
      text:`El mejor puntaje en simulacro es <strong>${state.bestScore}%</strong>, por debajo del umbral de aprobación (60%). Priorizar práctica en las unidades con menor rendimiento antes del próximo intento.`
    });
  }

  // Racha baja
  if ((state.streak||0) < 3 && (state.correct||0) > 5) {
    recs.push({ type:'info', icon:'💡',
      text:'La racha actual es baja. Intentar responder con calma y leer el feedback de cada pregunta para consolidar los conceptos antes de avanzar.'
    });
  }

  // Todo bien
  if (recs.length === 0) {
    recs.push({ type:'', icon:'🌟',
      text:'¡Excelente desempeño! El estudiante muestra un rendimiento sólido en todas las unidades evaluadas. Mantener la práctica regular y realizar simulacros periódicos.'
    });
  }

  return `
  <div class="section-label">💡 Recomendaciones Pedagógicas</div>
  <div style="margin-bottom:28px">
    ${recs.map(r=>`
      <div class="rec-item ${r.type}">
        <span class="rec-icon">${r.icon}</span>
        <span>${r.text}</span>
      </div>`).join('')}
  </div>`;
}

// ─────────────────────────────────────────────
// CHARTS
// ─────────────────────────────────────────────

// RADAR
function drawRadarChart(state) {
  const svg = document.getElementById('radar-svg');
  if (!svg) return;
  const us = state.unitStats || {};
  const cx=140, cy=130, r=100;
  const n = UNIT_META.length;
  const angles = UNIT_META.map((_,i) => (2*Math.PI*i/n) - Math.PI/2);

  // Grid
  let out = '';
  [0.25,0.5,0.75,1].forEach(lvl => {
    const pts = angles.map(a => `${cx+r*lvl*Math.cos(a)},${cy+r*lvl*Math.sin(a)}`).join(' ');
    out += `<polygon points="${pts}" fill="none" stroke="var(--borde)" stroke-width="${lvl===1?1.5:.8}"/>`;
  });

  // Axes + labels
  UNIT_META.forEach((u,i) => {
    const a = angles[i];
    const x2 = cx+r*Math.cos(a), y2 = cy+r*Math.sin(a);
    out += `<line x1="${cx}" y1="${cy}" x2="${x2}" y2="${y2}" stroke="var(--borde)" stroke-width=".8"/>`;
    const lx = cx+(r+18)*Math.cos(a), ly = cy+(r+18)*Math.sin(a);
    out += `<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="middle" font-size="10" fill="var(--texto-sub)" font-family="Nunito,sans-serif" font-weight="700">${u.id.toUpperCase()}</text>`;
  });

  // Data polygon
  const vals = UNIT_META.map(u => {
    const d = us[u.id]||{};
    return d.attempted > 0 ? d.correct/d.attempted : 0;
  });
  const pts = vals.map((v,i) => `${cx+r*v*Math.cos(angles[i])},${cy+r*v*Math.sin(angles[i])}`).join(' ');
  out += `<polygon points="${pts}" fill="rgba(0,200,150,.2)" stroke="var(--verde)" stroke-width="2"/>`;
  vals.forEach((v,i) => {
    const x=cx+r*v*Math.cos(angles[i]), y=cy+r*v*Math.sin(angles[i]);
    out += `<circle cx="${x}" cy="${y}" r="4" fill="${UNIT_META[i].color}" stroke="var(--fondo)" stroke-width="2"/>`;
  });

  // Pct labels
  [25,50,75,100].forEach(p => {
    const y = cy - r*(p/100);
    out += `<text x="${cx+4}" y="${y}" font-size="9" fill="var(--texto-sub)" font-family="Space Grotesk,sans-serif">${p}%</text>`;
  });

  svg.innerHTML = out;
}

// LINE CHART SIMULACROS
function drawExamProgressChart(state) {
  const svg = document.getElementById('exam-progress-svg');
  if (!svg) return;
  const history = state.examHistory || [];
  if (history.length < 1) {
    svg.innerHTML = `<text x="160" y="70" text-anchor="middle" font-size="13" fill="var(--texto-sub)" font-family="Nunito,sans-serif">Sin datos de simulacros</text>`;
    return;
  }

  const W=320, H=140, PAD=30;
  const scores = history.map(e=>e.score);
  const minS = 0, maxS = 100;
  const xStep = history.length > 1 ? (W-PAD*2)/(history.length-1) : 0;

  const toX = i => PAD + i*xStep;
  const toY = v => H - PAD - ((v-minS)/(maxS-minS))*(H-PAD*2);

  let out = '';

  // Grid lines y %
  [0,25,50,60,75,100].forEach(p => {
    const y = toY(p);
    const col = p===60 ? 'rgba(0,200,150,.4)' : 'rgba(37,37,69,.8)';
    const dash = p===60 ? '4,3' : '';
    out += `<line x1="${PAD}" y1="${y}" x2="${W-PAD}" y2="${y}" stroke="${col}" stroke-width="${p===60?1.5:.7}" stroke-dasharray="${dash}"/>`;
    out += `<text x="${PAD-4}" y="${y+4}" text-anchor="end" font-size="9" fill="var(--texto-sub)" font-family="Space Grotesk,sans-serif">${p}%</text>`;
  });

  // Area fill
  if (history.length > 1) {
    const area = history.map((e,i)=>`${toX(i)},${toY(e.score)}`).join(' ');
    const last = toX(history.length-1);
    out += `<polygon points="${area} ${last},${H-PAD} ${PAD},${H-PAD}" fill="rgba(59,130,246,.12)"/>`;
  }

  // Line
  if (history.length > 1) {
    const pts = history.map((e,i)=>`${toX(i)},${toY(e.score)}`).join(' ');
    out += `<polyline points="${pts}" fill="none" stroke="var(--azul)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>`;
  }

  // Points + labels
  history.forEach((e,i) => {
    const x=toX(i), y=toY(e.score);
    const col = e.score>=60 ? 'var(--verde)' : 'var(--naranja)';
    out += `<circle cx="${x}" cy="${y}" r="5" fill="${col}" stroke="var(--fondo2)" stroke-width="2"/>`;
    out += `<text x="${x}" y="${y-10}" text-anchor="middle" font-size="10" font-weight="700" fill="${col}" font-family="Space Grotesk,sans-serif">${e.score}%</text>`;
    if (e.date) {
      const short = e.date.split('-').slice(1).join('/');
      out += `<text x="${x}" y="${H-10}" text-anchor="middle" font-size="9" fill="var(--texto-sub)" font-family="Nunito,sans-serif">${short}</text>`;
    }
  });

  // Umbral label
  out += `<text x="${W-PAD+2}" y="${toY(60)+4}" font-size="9" fill="var(--verde)" font-family="Nunito,sans-serif" font-weight="700">60%</text>`;

  svg.innerHTML = out;
}

// HEATMAP
function drawHeatmap(state) {
  const container = document.getElementById('heatmap-container');
  if (!container) return;
  const dates = state.sessionDates || [];
  if (!dates.length) {
    container.innerHTML = '<div style="color:var(--texto-sub);font-size:.83rem;padding:12px 0">Sin sesiones registradas aún.</div>';
    return;
  }

  // Construir últimas 5 semanas (35 días)
  const today = new Date();
  const cells = [];
  for (let d=34; d>=0; d--) {
    const dt = new Date(today); dt.setDate(today.getDate()-d);
    const key = dt.toISOString().split('T')[0];
    const count = dates.filter(x=>x===key).length;
    cells.push({ date:key, count, label:dt.getDate() });
  }

  const maxC = Math.max(1, ...cells.map(c=>c.count));
  const dayNames = ['D','L','M','X','J','V','S'];

  let html = `
  <div style="display:flex;gap:6px;margin-bottom:6px">
    ${dayNames.map(d=>`<div style="width:24px;text-align:center;font-size:.65rem;color:var(--texto-sub);font-weight:700">${d}</div>`).join('')}
  </div>
  <div class="heat-grid">
    ${cells.map(c => {
      const opacity = c.count === 0 ? 0.12 : 0.3 + 0.7*(c.count/maxC);
      const bg = c.count === 0 ? 'var(--borde)' : `rgba(0,200,150,${opacity})`;
      return `<div class="heat-cell" style="background:${bg}" title="${c.date}${c.count?' — '+c.count+' sesión(es)':''}">${c.label}</div>`;
    }).join('')}
  </div>
  <div style="display:flex;align-items:center;gap:6px;margin-top:10px;font-size:.7rem;color:var(--texto-sub)">
    <span>Menos</span>
    ${[0.12,0.4,0.65,0.85,1].map(op=>`<div style="width:14px;height:14px;border-radius:3px;background:rgba(0,200,150,${op})"></div>`).join('')}
    <span>Más</span>
  </div>`;
  container.innerHTML = html;
}

// DONUT
function drawMiniDonut(state) {
  const svg = document.getElementById('donut-svg');
  const legend = document.getElementById('donut-legend');
  if (!svg || !legend) return;

  const us = state.unitStats || {};
  const totalCorrect = Object.values(us).reduce((a,u)=>a+(u.correct||0),0);
  const totalWrong = Object.values(us).reduce((a,u)=>a+(u.incorrect||0),0);
  const totalUnanswered = UNIT_META.reduce((a,u)=>a+(u.total-(us[u.id]?.attempted||0)),0);

  const data = [
    { label:'Correctas', value:totalCorrect, color:'var(--verde)' },
    { label:'Incorrectas', value:totalWrong, color:'var(--naranja)' },
    { label:'Sin responder', value:totalUnanswered, color:'var(--borde)' },
  ];

  const total = data.reduce((a,d)=>a+d.value,0);
  if (total === 0) {
    svg.innerHTML = `<text x="70" y="74" text-anchor="middle" font-size="11" fill="var(--texto-sub)" font-family="Nunito,sans-serif">Sin datos</text>`;
    legend.innerHTML = '';
    return;
  }

  const cx=70, cy=70, R=55, r=32;
  let startAngle = -Math.PI/2;
  let out = '';

  data.forEach(d => {
    const angle = (d.value/total)*2*Math.PI;
    const endAngle = startAngle + angle;
    const x1=cx+R*Math.cos(startAngle), y1=cy+R*Math.sin(startAngle);
    const x2=cx+R*Math.cos(endAngle), y2=cy+R*Math.sin(endAngle);
    const xi1=cx+r*Math.cos(startAngle), yi1=cy+r*Math.sin(startAngle);
    const xi2=cx+r*Math.cos(endAngle), yi2=cy+r*Math.sin(endAngle);
    const large = angle > Math.PI ? 1 : 0;
    if (angle > 0.01) {
      out += `<path d="M${xi1},${yi1} L${x1},${y1} A${R},${R} 0 ${large},1 ${x2},${y2} L${xi2},${yi2} A${r},${r} 0 ${large},0 ${xi1},${yi1} Z"
        fill="${d.color}" opacity=".9"/>`;
    }
    startAngle = endAngle;
  });

  // Centro
  const pct = total > 0 ? Math.round(totalCorrect/total*100) : 0;
  out += `<text x="${cx}" y="${cy-4}" text-anchor="middle" font-size="15" font-weight="900" fill="var(--verde)" font-family="Space Grotesk,sans-serif">${pct}%</text>`;
  out += `<text x="${cx}" y="${cy+12}" text-anchor="middle" font-size="9" fill="var(--texto-sub)" font-family="Nunito,sans-serif">acierto</text>`;
  svg.innerHTML = out;

  legend.innerHTML = data.map(d => `
    <div style="display:flex;align-items:center;gap:7px;margin-bottom:8px">
      <div style="width:11px;height:11px;border-radius:3px;background:${d.color};flex-shrink:0"></div>
      <div>
        <div style="font-size:.8rem;font-weight:700">${d.label}</div>
        <div style="font-size:.75rem;color:var(--texto-sub)">${d.value} (${total>0?Math.round(d.value/total*100):0}%)</div>
      </div>
    </div>`).join('');
}
